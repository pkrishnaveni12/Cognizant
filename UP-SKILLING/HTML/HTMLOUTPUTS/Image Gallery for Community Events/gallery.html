<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Community Event Gallery</title>

    <style>
        table {
            margin: auto;
            border-collapse: collapse;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        img {
            width: 200px;
            height: 150px;
        }

        .eventImage {
            border: 3px solid blue;
        }

        caption {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>

</head>

<body>

    <table border="1">

        <caption>Community Event Gallery</caption>

        <tr>

            <td>
                <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b?w=400"
                     alt="Sports Event"
                     title="Sports Event"
                     class="eventImage">
                <br>Sports Event
            </td>

            <td>
                <img src="https://images.unsplash.com/photo-1501386761578-eac5c94b800a?w=400"
                     alt="Music Event"
                     title="Music Event"
                     class="eventImage">
                <br>Music Event
            </td>

            <td>
                <img src="https://images.unsplash.com/photo-1482049016688-2d3e1b311543?w=400"
                     alt="Food Festival"
                     title="Food Festival"
                     class="eventImage">
                <br>Food Festival
            </td>

        </tr>

        <tr>

            <td>
                <img src="https://images.unsplash.com/photo-1521587760476-6c12a4b040da?w=400"
                     alt="Book Fair"
                     title="Book Fair"
                     class="eventImage">
                <br>Book Fair
            </td>

            <td>
                <img src="https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=400"
                     alt="Art Exhibition"
                     title="Art Exhibition"
                     class="eventImage">
                <br>Art Exhibition
            </td>

            <td>
                <img src="https://images.unsplash.com/photo-1511578314322-379afb476865?w=400"
                     alt="Cultural Program"
                     title="Cultural Program"
                     class="eventImage">
                <br>Cultural Program
            </td>

        </tr>

    </table>

</body>

</html>
