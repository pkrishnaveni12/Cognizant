<!DOCTYPE html>
<html>

<head>

    <title>Chrome DevTools Demo</title>

    <script>

        function calculate() {

            let a = 20;

            let b = 30;

            let sum = a + b;

            console.log("Value of a = " + a);

            console.log("Value of b = " + b);

            console.log("Sum = " + sum);

            alert("Check Console for Output");

        }

    </script>

</head>

<body>

    <h2>Chrome DevTools Debugging</h2>

    <button onclick="calculate()">

        Run Script

    </button>

</body>

</html>
